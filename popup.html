<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perma-Recall Link 設定</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Perma-Recall Link</h1>
      <p class="subtitle">履歴管理設定</p>
    </header>

    <section class="stats">
      <h2>統計情報</h2>
      <div class="stat-item">
        <span class="stat-label">保存済みURL数:</span>
        <span class="stat-value" id="urlCount">読み込み中...</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">最終インポート:</span>
        <span class="stat-value" id="lastImport">未実行</span>
      </div>
    </section>

    <section class="actions">
      <h2>履歴操作</h2>

      <div class="action-item">
        <button id="importBtn" class="btn btn-primary">
          <span class="btn-icon">📥</span>
          履歴を再インポート
        </button>
        <p class="action-description">
          過去90日分の訪問履歴を再度IndexedDBにインポートします
        </p>
      </div>

      <div class="action-item">
        <button id="clearBtn" class="btn btn-danger">
          <span class="btn-icon">🗑️</span>
          履歴をクリア
        </button>
        <p class="action-description">
          保存されている全ての訪問履歴データを削除します（注意：元に戻せません）
        </p>
      </div>
    </section>

    <section class="status">
      <div id="statusMessage" class="status-message"></div>
      <div id="progressBar" class="progress-bar" style="display: none;">
        <div class="progress-fill" id="progressFill"></div>
        <span class="progress-text" id="progressText">0%</span>
      </div>
    </section>

    <footer>
      <p class="version">Version 1.0.0</p>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
